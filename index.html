<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <title>Frontend Mentor | Expenses chart component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <main class="card-container">
    <h1 class="sr-only">Expenses Chart Component</h1>
    <div class="card-header__wrapper">
      <div class="card-header__text">
        <h2 class="card-header__title">My balance</h2>
        <p class="card-header__balance">$921.48</p>
      </div>
      <span class="card-header__icon"></span>
    </div>
    <div class="card-content__wrapper">
      <h2 class="card-content__title">Spending - Last 7 days</h2>
      <ul class="card-content__graphic graphic__wrapper">
        <li class="graphic__column" id="monday">
          <p class="graphic__column--day">mon</p>
          <span class="graphic__column--value"></span>
        </li>
        <li class="graphic__column" id="tuesday">
          <p class="graphic__column--day">tue</p>
          <span class="graphic__column--value"></span>
        </li>
        <li class="graphic__column" id="wednesday">
          <p class="graphic__column--day">wed</p>
          <span class="graphic__column--value"></span>
        </li>
        <li class="graphic__column" id="thursday">
          <p class="graphic__column--day">thu</p>
          <span class="graphic__column--value"></span>
        </li>
        <li class="graphic__column" id="friday">
          <p class="graphic__column--day">fri</p>
          <span class="graphic__column--value active"></span>
        </li>
        <li class="graphic__column" id="saturday">
          <p class="graphic__column--day">sat</p>
          <span class="graphic__column--value"></span>
        </li>
        <li class="graphic__column" id="sunday">
          <p class="graphic__column--day">sun</p>
          <span class="graphic__column--value"></span>
        </li>
      </ul>
      <span class="card-content__separator"></span>
      <div class="card-content__summary summary__wrapper">
        <div class="summary__this-month this-month__wrapper">
          <h3 class="this-month__title">Total this month</h3>
          <p class="this-month__value">$478.33</p>
        </div>
        <div class="summary__last-month last-month__wrapper">
          <p class="last-month__value">+2.4%</p>
          <h3 class="last-month__title">from last month</h3>
        </div>
      </div>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/psudo-dev">psudo-dev</a>.
  </footer>
  <script type="module" src="./src/index.ts"></script>
</body>

</html>
