<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <title>Frontend Mentor | Expenses chart component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <main class="card">
    <h1 class="sr-only">Expenses Chart Component</h1>
    <div class="card-header">
      <div class="card-header__text">
        <h2 class="card-header__title">My balance</h2>
        <p class="card-header__balance"></p>
      </div>
      <span class="card-header__icon" aria-hidden="true"></span>
    </div>
    <div class="card-content">
      <h2 class="card-content__title">Spending - Last 7 days</h2>
      <ul class="card-content__chart">
      </ul>
      <span class="card-content__separator" aria-hidden="true"></span>
      <div class="card-content__summary">
        <div class="summary__current-month">
          <h3 class="summary__current-month-title">Total this month</h3>
          <p class="summary__current-month-value"></p>
        </div>
        <div class="summary__last-month">
          <p class="summary__last-month-value"></p>
          <h3 class="summary__last-month-title">from last month</h3>
        </div>
      </div>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/psudo-dev">psudo-dev</a>.
  </footer>
  <script type="module" src="./src/index.ts"></script>
</body>

</html>
